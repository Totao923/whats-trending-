<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password — What's Trending</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a; color: #f1f5f9;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #111827; border: 1px solid #1f2937; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 400px; margin: 20px;
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon { font-size: 2rem; margin-bottom: 8px; }
    .brand h1 { font-size: 1.2rem; font-weight: 700; }
    .brand p  { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
    label {
      display: block; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: #9ca3af; margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%; background: #1f2937; border: 1px solid #374151;
      border-radius: 8px; padding: 12px 14px; color: #f1f5f9;
      font-size: 0.95rem; outline: none; margin-bottom: 16px; transition: border-color 0.15s;
    }
    input:focus { border-color: #10b981; }
    .btn {
      width: 100%; background: #10b981; color: #fff; border: none;
      border-radius: 8px; padding: 13px; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: #059669; }
    .btn:disabled { background: #374151; cursor: not-allowed; }
    .error-msg {
      background: #7f1d1d; border: 1px solid #991b1b; border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem; color: #fca5a5;
      margin-bottom: 16px; display: none;
    }
    .hint { font-size: 0.75rem; color: #6b7280; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🔥</div>
    <h1>Set Your Password</h1>
    <p>Choose a new password to access What's Trending</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <label for="new-password">New Password</label>
  <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password" />

  <label for="confirm-password">Confirm Password</label>
  <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" />

  <p class="hint">Must be at least 8 characters.</p>

  <button class="btn" id="btn-set">Set Password & Continue</button>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const errorEl  = document.getElementById('error-msg');
  const newPassEl = document.getElementById('new-password');
  const confPassEl = document.getElementById('confirm-password');
  const btn = document.getElementById('btn-set');

  // Must be logged in to reach this page
  db.auth.getSession().then(({ data }) => {
    if (!data.session) window.location.href = 'login.html';
  });

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }

  async function setPassword() {
    const pass    = newPassEl.value;
    const confirm = confPassEl.value;
    errorEl.style.display = 'none';

    if (pass.length < 8)      { showError('Password must be at least 8 characters.'); return; }
    if (pass !== confirm)     { showError('Passwords do not match.'); return; }

    btn.disabled = true; btn.textContent = 'Saving…';

    const { error } = await db.auth.updateUser({
      password: pass,
      data: { force_password_change: false }
    });

    if (error) {
      showError(error.message);
      btn.disabled = false; btn.textContent = 'Set Password & Continue';
    } else {
      window.location.href = 'index.html';
    }
  }

  btn.addEventListener('click', setPassword);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') setPassword(); });
</script>
</body>
</html>
