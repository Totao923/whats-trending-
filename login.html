<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — What's Trending</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon { font-size: 2.5rem; margin-bottom: 8px; }

    .brand h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .brand p {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }

    input:focus { border-color: #10b981; }

    .btn-login {
      width: 100%;
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-login:hover { background: #059669; }
    .btn-login:disabled { background: #374151; cursor: not-allowed; }

    .error-msg {
      background: #7f1d1d;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">🔥</div>
    <h1>What's Trending</h1>
    <p>Weekly Food Intelligence</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

  <button class="btn-login" id="btn-login">Sign In</button>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  const emailEl    = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const btnLogin   = document.getElementById('btn-login');
  const errorMsg   = document.getElementById('error-msg');

  // If already logged in, go straight to the app
  db.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  async function login() {
    const email    = emailEl.value.trim();
    const password = passwordEl.value;

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    btnLogin.disabled  = true;
    btnLogin.textContent = 'Signing in…';
    errorMsg.style.display = 'none';

    const { error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      showError(error.message);
      btnLogin.disabled = false;
      btnLogin.textContent = 'Sign In';
    } else {
      window.location.href = 'index.html';
    }
  }

  btnLogin.addEventListener('click', login);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
